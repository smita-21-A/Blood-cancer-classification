<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>

    <style>
        body {
            margin: 0;
            font-family: "Arial", sans-serif;
            background: linear-gradient(to bottom right, #ff4d4d, #660000);
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            backdrop-filter: blur(20px);
        }

        .navbar h2 {
            margin: 0;
            font-size: 28px;
        }

        .navbar a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .container {
            width: 450px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            color: black;
            box-shadow: 0px 0px 12px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            color: #f9f3f3;
            margin-bottom: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid gray;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #990000;
            color: white;
            border: none;
            margin-top: 15px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .success {
            background: #c8e6c9;
            padding: 12px;
            color: #1b5e20;
            border-left: 5px solid green;
            margin-bottom: 15px;
            border-radius: 5px;
        }

        footer {
            margin-top: 159px;
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            font-size: 14px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <h2><b>BloodShield AI</b></h2>
        <div>
            <a href="/">Home</a>
            <a href="/detect">Detection</a>
            <a href="/treatment">Treatment</a>
            <a href="/contact">Contact</a>
            <a href="/feedback">Feedback</a>
        </div>
    </div>

    <!-- FEEDBACK FORM -->
    <div class="container">
        <h2>Feedback Form</h2>

        {% if success %}
            <div class="success">Thank you for your feedback!</div>
        {% endif %}

        <form action="/feedback" method="POST">
           <label>Name</label>
            <input type="text" name="name"  required>
             <label>Rating</label>
            <select name="rating" required>
                <option value="">Rate Us</option>
                <option value="5">⭐⭐⭐⭐⭐ - Excellent</option>
                <option value="4">⭐⭐⭐⭐ - Very Good</option>
                <option value="3">⭐⭐⭐ - Good</option>
                <option value="2">⭐⭐ - Average</option>
                <option value="1">⭐ - Poor</option>
            </select>
            <label>Comment</label>
            <textarea name="comment" rows="4" required></textarea>

            <button type="submit">Submit</button>
        </form>
    </div>

    <footer>
        © 2025 BloodShield AI – Blood Cancer Detection & Assistance System  
    </footer>

</body>
</html>
