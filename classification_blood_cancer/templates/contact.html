<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us – BloodShield AI</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        header {
            background: #8b0000;
            padding: 20px;
            color: white;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }

        nav {
            background: #b30000;
            display: flex;
            justify-content: center;
            padding: 12px;
        }

        nav a {
            color: white;
            margin: 0 18px;
            text-decoration: none;
            font-size: 18px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            width: 90%;
            margin: auto;
            margin-top: 40px;
        }

        .title {
            text-align: center;
            font-size: 32px;
            color: #900000;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        label {
            font-size: 18px;
            font-weight: bold;
            color: #b30000;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 18px;
            border-radius: 10px;
            border: 2px solid #ccc;
            font-size: 16px;
        }

        button {
            background: #b30000;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #8b0000;
        }

        .success {
            background: #d4edda;
            padding: 15px;
            border-left: 5px solid #28a745;
            color: #155724;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>

<header>BloodShield AI – Contact Us</header>

<nav>
    <a href="/">Home</a>
    <a href="/detect">Detection</a>
    <a href="/treatment">Treatment</a>
    <a href="/contact">Contact</a>
    <a href="/feedback">Feedback</a>
</nav>

<div class="container">

    <div class="title">Get in Touch</div>

    <div class="card">

        {% if success %}
        <div class="success">
            ✔ Your message has been sent successfully!
        </div>
        {% endif %}

        <form action="/contact" method="POST">
            <label>Your Name</label>
            <input type="text" name="name" required>

            <label>Email Address</label>
            <input type="email" name="email" required>

            <label>Your Message</label>
            <textarea rows="5" name="message" required></textarea>

            <button type="submit">Send Message</button>
        </form>
    </div>

</div>

</body>
</html>
